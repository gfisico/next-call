# next-call 本番 compose（Xserver VPS 上で運用）。
#
# app   : GHCR のイメージを pull して起動。SQLite は /srv/next-call/data に永続化。
# caddy : 80/443 を受けて {$APP_DOMAIN} を app:3000 へリバースプロキシ。TLS 自動発行。
#
# 環境変数は .env（.env.deploy.example をコピーして作成）から注入する。
# デプロイは docs/ops.md 参照（compose pull && up -d）。
services:
  app:
    # ${APP_IMAGE} 未指定時は GHCR の latest を既定にする。
    # ロールバック時は APP_IMAGE=ghcr.io/<owner>/next-call:<sha> を指定して up -d。
    image: ${APP_IMAGE:-ghcr.io/OWNER/next-call:latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 日付解釈は JST が正（unit-01 規定）。コンテナ TZ を固定する。
      TZ: Asia/Tokyo
      # SQLite は volume マウント先に固定。
      DATABASE_PATH: /data/next-call.db
    volumes:
      # ホストの実 DB ディレクトリ。backup.sh はこのホストパスを対象にする。
      - /srv/next-call/data:/data
    expose:
      - "3000"
    healthcheck:
      # slim に curl/wget が無いため node で /api/health を叩く（Dockerfile と同方針）。
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Caddyfile が参照するドメイン / ACME 連絡先。.env で定義する。
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # 発行済み証明書と設定を永続化（再起動で再取得しない＝レート制限回避）。
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
